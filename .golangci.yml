version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gosec
    - revive
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: exported
        - name: unreachable-code
        - name: dot-imports
  exclusions:
    rules:
      # CLI binaries: checking fmt.Fprint* errors on command output writers
      # is noise; failures there are unactionable.
      - path: ^cmd/
        linters:
          - errcheck
        text: "fmt.Fprint"
      # Tests operate on synthetic data and local fixtures; gosec findings
      # (weak rand, file perms, variable paths/subprocess) are not applicable.
      - path: _test\.go
        linters:
          - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
