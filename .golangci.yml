version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  revive:
    rules:
      - name: blank-imports
      - name: exported
      - name: unreachable-code
      - name: dot-imports

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 5
